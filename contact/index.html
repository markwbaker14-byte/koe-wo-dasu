}

.form-wrap {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 20px;
}

.privacy-note {
  font-size: 13px;
  color: var(--text-light);
  line-height: 1.7;
}

.privacy-note a {
  color: var(--accent);
  text-decoration: none;
}
.privacy-note a:hover { text-decoration: underline; }

/* Footer */
footer {

.footer-copy { font-size: 12px; color: oklch(45% 0.007 260); }

@media (max-width: 768px) {
  main { padding: 40px 20px; }
